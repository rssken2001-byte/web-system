<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>客戶管理系統</title>
</head>

<body>

<h2>📌 客戶管理系統</h2>

<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">

<button onclick="add()">新增</button>
<button onclick="downloadExcel()">下載Excel</button>

<hr>

<div id="list"></div>

<script>

// ✅ 載入資料
function load(){

    fetch("/users")
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.forEach((item, i) => {
            html += `
            <p>
                ${item.name} - ${item.phone}

                <button onclick="remove(${item.id})">刪除</button>
            </p>
            `;
        });

        document.getElementById("list").innerHTML = html;
    });
}


// ✅ 新增
function add(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    fetch("/add_user", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ name, phone })
    })
    .then(res => res.json())
    .then(data => {
        alert("新增成功");
        load();
    });
}


// ✅ 刪除
function remove(id){

    fetch("/delete_user/" + id, {
        method:"DELETE"
    })
    .then(res => res.json())
    .then(data => {
        alert("已刪除");
        load();
    });
}


// ✅ Excel下載（關鍵🔥）
function downloadExcel(){
    window.open("/download_excel");
}


// ✅ 啟動
load();

</script>

</body>
</html>
