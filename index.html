<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>客戶管理系統</title>

<style>

/* ✅ 整體背景 */
body {
    font-family: "Microsoft JhengHei";
    background: #f5f6fa;
}

/* ✅ 中間白色卡片 */
.container {
    width: 500px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ✅ 輸入框 */
input {
    padding: 8px;
    margin: 5px;
}

/* ✅ 按鈕 */
button {
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* ✅ 各種按鈕顏色 */
.add-btn { background: green; color: white; }
.delete-btn { background: red; color: white; }
.edit-btn { background: orange; color: white; }

/* ✅ 列表樣式 */
.list-item {
    background: #eee;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
}

</style>
</head>

<body>

<div class="container">

<h1>📌 客戶管理系統</h1>

<!-- ✅ 輸入區 -->
<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">
<button class="add-btn" onclick="add()">新增</button>

<br>

<!-- ✅ 查詢區 -->
<input id="search" placeholder="搜尋姓名">
<button onclick="search()">查詢</button>

<hr>

<!-- ✅ 顯示資料 -->
<div id="list"></div>

</div>

<script>

/* ============================
✅ 1️⃣ 資料來源（最重要）
============================ */

// ✅ 從瀏覽器讀資料（沒有就空陣列）
let data = JSON.parse(localStorage.getItem("customers")) || [];


/* ============================
✅ 2️⃣ 儲存資料（共用函數）
============================ */
function save(){
    // ✅ 把資料轉成文字存進瀏覽器
    localStorage.setItem("customers", JSON.stringify(data));
}


/* ============================
✅ 3️⃣ 新增功能
============================ */
function add(){

    // ✅ 抓輸入內容
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();

    // ✅ 防呆：不能空
    if(name === "" || phone === ""){
        alert("請輸入資料");
        return;
    }

    // ✅ 加進資料
    data.push({name, phone});

    save();      // ✅ 儲存
    render();    // ✅ 更新畫面

    // ✅ 清空輸入框
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
}


/* ============================
✅ 4️⃣ 刪除功能
============================ */
function remove(index){

    if(confirm("確定刪除？")){
        data.splice(index,1);  // ✅ 刪掉
        save();
        render();
    }
}


/* ============================
✅ 5️⃣ 修改功能
============================ */
function edit(index){

    let newName = prompt("修改姓名", data[index].name);
    let newPhone = prompt("修改電話", data[index].phone);

    if(newName && newPhone){
        data[index].name = newName.trim();
        data[index].phone = newPhone.trim();

        save();
        render();
    }
}


/* ============================
✅ 6️⃣ 查詢按鈕
============================ */
function search(){
    render();  // ✅ 直接重新顯示
}


/* ============================
✅ 7️⃣ 顯示畫面（核心🔥）
============================ */
function render(){

    let html = "";

    // ✅ 取搜尋文字
    let keyword = document.getElementById("search").value.toLowerCase();

    // ✅ 逐筆顯示
    data.forEach((item, i) => {

        // ✅ 如果符合搜尋
        if(item.name.toLowerCase().includes(keyword)){

            html += `
            <div class="list-item">
                ${i+1}. ${item.name} - ${item.phone}

                <button class="edit-btn" onclick="edit(${i})">修改</button>
                <button class="delete-btn" onclick="remove(${i})">刪除</button>
            </div>
            `;
        }
    });

    document.getElementById("list").innerHTML = html;
}


/* ============================
✅ 8️⃣ Enter快捷鍵（加分🔥）
============================ */
document.getElementById("phone").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        add();
    }
});


/* ✅ 開頁自動顯示資料 */
render();

</script>

</body>
</html>
