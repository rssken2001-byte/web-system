<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>客戶管理系統</title>

<style>
body {
    font-family: Microsoft JhengHei;
    background: #f5f6fa;
}

.container {
    width: 500px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
    padding: 8px;
    margin-right: 5px;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
}

.add-btn {
    background: green;
    color: white;
}

.delete-btn {
    background: red;
    color: white;
}

.edit-btn {
    background: orange;
    color: white;
}

.list-item {
    background: #eee;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>📌 客戶管理系統</h1>

<!-- ✅ 輸入 -->
<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">
<button class="add-btn" onclick="add()">新增</button>

<br><br>

<!-- ✅ 搜尋功能 -->
<input id="search" placeholder="搜尋姓名" oninput="render()">

<hr>

<div id="list"></div>

</div>

<script>

// ✅ 從瀏覽器讀資料（沒有就給空陣列）
let data = JSON.parse(localStorage.getItem("customers")) || [];

/* ===========================
✅ 新增客戶
=========================== */
function add(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    if(name === "" || phone === ""){
        alert("請輸入資料");
        return;
    }

    // ✅ 加入資料
    data.push({name, phone});

    // ✅ 存進瀏覽器
    localStorage.setItem("customers", JSON.stringify(data));

    render();

    // ✅ 清空欄位
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
}

/* ===========================
✅ 刪除
=========================== */
function remove(index){

    data.splice(index,1);

    // ✅ 同步更新
    localStorage.setItem("customers", JSON.stringify(data));

    render();
}

/* ===========================
✅ 編輯（超加分🔥）
=========================== */
function edit(index){

    let newName = prompt("修改姓名：", data[index].name);
    let newPhone = prompt("修改電話：", data[index].phone);

    if(newName && newPhone){
        data[index].name = newName;
        data[index].phone = newPhone;

        localStorage.setItem("customers", JSON.stringify(data));
        render();
    }
}

✅ 顯示畫面（核心）
=========================== */
