<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>客戶管理系統</title>
</head>

<body>

<h2>客戶管理系統</h2>

<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">

<button onclick="send()">新增</button>

<h3>📋 客戶列表</h3>
<ul id="list"></ul>

<script>
function send(){

    fetch("/add_user", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value
        })
    })
    .then(response => response.json())
    .then(data => {
        alert("✅ 新增成功");
        loadUsers(); // ✅ 新增後重新載入
    });
}

// ✅ 載入資料
function loadUsers(){
    fetch("/users")
    .then(res => res.json())
    .then(data => {

        let list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(user => {
            let li = document.createElement("li");
            li.textContent = user.name + " - " + user.phone;
            list.appendChild(li);
        });
    });
}

// ✅ 一開頁就載入
loadUsers();

</script>

</body>
</html>
