<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>客戶管理系統</title>

<!-- ✅ CSS 美化 -->
<style>

/* ✅ 整體背景 */
body {
    font-family: "Microsoft JhengHei";
    background: #f5f6fa; /* 淺灰背景 */
    margin: 0;
}

/* ✅ 卡片容器 */
.container {
    width: 500px;
    margin: 50px auto;   /* 置中 */
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
}

/* ✅ 標題 */
h1 {
    text-align: center;
}

/* ✅ 輸入框 */
input {
    padding: 10px;
    margin-right: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* ✅ 按鈕共用樣式 */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* ✅ 新增按鈕 */
.add-btn {
    background: #4cd137;
    color: white;
}

.add-btn:hover {
    background: #44bd32;
}

/* ✅ 刪除按鈕 */
.delete-btn {
    background: #e84118;
    color: white;
}

.delete-btn:hover {
    background: #c23616;
}
