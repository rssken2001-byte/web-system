<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>客戶管理系統</title>

<style>
body {
    font-family: Microsoft JhengHei;
    background: #f5f6fa;
}

.container {
    width: 500px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
}

.add-btn {
    background: green;
    color: white;
}

.delete-btn {
    background: red;
    color: white;
}

.list-item {
    background: #eee;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
}
</style>

</head>

<body>

<div class="container">

<h1>📌 客戶管理系統</h1>

<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">
<button class="add-btn" onclick="add()">新增</button>

<hr>

<div id="list"></div>

</div>

<script>

let data = [];

function add(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    if(name === "" || phone === ""){
        alert("請輸入資料");
        return;
    }

    data.push({name, phone});
    render();
}

function remove(index){
    data.splice(index,1);
    render();
}

function render(){

    let html = "";

    data.forEach((item, i) => {
        html += `
        <div class="list-item">
            ${item.name} - ${item.phone}
            <button class="delete-btn" onclick="remove(${i})">刪除</button>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

</script>

</body>
</html>
