<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>客戶管理系統</title>

<style>
/* ✅ 整體背景設定 */
body {
    font-family: "Microsoft JhengHei";
    background: #f5f6fa;
}

/* ✅ 白色卡片 */
.container {
    width: 500px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ✅ 輸入框 */
input {
    padding: 8px;
    margin-right: 5px;
}

/* ✅ 按鈕共同樣式 */
button {
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* ✅ 新增按鈕 */
.add-btn {
    background: green;
    color: white;
}

/* ✅ 刪除按鈕 */
.delete-btn {
    background: red;
    color: white;
}

/* ✅ 修改按鈕 */
.edit-btn {
    background: orange;
    color: white;
}

/* ✅ 列表區 */
.list-item {
    background: #eee;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>📌 客戶管理系統</h1>

<!-- ✅ 輸入區 -->
<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">
<button class="add-btn" onclick="add()">新增</button>

<br><br>

<!-- ✅ 搜尋欄（輸入會自動查） -->
<input id="search" placeholder="搜尋姓名" oninput="render()">

<hr>

<!-- ✅ 顯示資料 -->
<div id="list"></div>

</div>

<script>

/* =====================================
✅ 1️⃣ 資料區（最重要）
===================================== */

// ✅ 從瀏覽器讀資料（沒有就空陣列）
let data = JSON.parse(localStorage.getItem("customers")) || [];


/* =====================================
✅ 2️⃣ 新增功能
===================================== */
function add(){

    // ✅ 取得輸入的值
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    // ✅ 防呆（不能空白）
    if(name === "" || phone === ""){
        alert("請輸入資料");
        return;
    }

    // ✅ 新增到資料陣列
    data.push({name, phone});

    // ✅ 存進瀏覽器（重要🔥）
    localStorage.setItem("customers", JSON.stringify(data));

    // ✅ 重新畫畫面
    render();

    // ✅ 清空欄位
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
}


/* =====================================
✅ 3️⃣ 刪除功能
===================================== */
function remove(index){

    // ✅ 刪除指定資料
    data.splice(index, 1);

    // ✅ 更新儲存（一定要）
    localStorage.setItem("customers", JSON.stringify(data));

    render();
}


/* =====================================
✅ 4️⃣ 修改功能（加分🔥）
===================================== */
function edit(index){

    // ✅ 跳出輸入框讓使用者修改
    let newName = prompt("修改姓名：", data[index].name);
    let newPhone = prompt("修改電話：", data[index].phone);

    // ✅ 確保有輸入
    if(newName && newPhone){
        data[index].name = newName;
        data[index].phone = newPhone;

        // ✅ 更新儲存
        localStorage.setItem("customers", JSON.stringify(data));

        render();
    }
}


/* =====================================
✅ 5️⃣ 顯示畫面（核心）
===================================== */
function render(){

    let html = "";

    // ✅ 取得搜尋文字
    let keyword = document.getElementById("search").value.toLowerCase();

    // ✅ 跑每筆資料
    data.forEach((item, i) => {

        // ✅ 搜尋過濾（只有符合才顯示）
        if(item.name.toLowerCase().includes(keyword)){

            html += `
            <div class="list-item">
                ${i+1}. ${item.name} - ${item.phone}

                <button class="edit-btn" onclick="edit(${i})">修改</button>
                <button class="delete-btn" onclick="remove(${i})">刪除</button>
            </div>
            `;
        }
    });

    // ✅ 更新畫面
    document.getElementById("list").innerHTML = html;
}


/* =====================================
✅ 6️⃣ 開頁自動載入（重要🔥）
===================================== */
render();

</script>

</body>
</html>
