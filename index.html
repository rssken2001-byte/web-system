<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>客戶管理系統</title>

    <style>
        /* ✅ 基本畫面設定 */
        body {
            font-family: Arial;
            padding: 30px;
        }

        input {
            padding: 8px;
            margin-right: 10px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<h2>📌 客戶管理系統</h2>

<!-- ✅ 輸入區 -->
<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">

<button onclick="send()">新增</button>

<hr>

<h3>📋 客戶列表</h3>
<ul id="list"></ul>

<script>

// ============================
// ✅ 新增資料
// ============================
function send(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    // ✅ 防呆（不能空白）
    if(!name || !phone){
        alert("❗ 請填寫完整資料");
        return;
    }

    // ✅ 呼叫 API
    fetch("/add_user", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: name,
            phone: phone
        })
    })

    .then(res => res.json())
    .then(data => {

        if(data.status === "ok"){

            alert("✅ 新增成功");

            // ✅ 清空欄位
            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";

            // ✅ 重新載入清單
            loadUsers();
        }
    });
}


// ============================
// ✅ 刪除資料（重要🔥）
// ============================
function deleteUser(id){

    fetch("/delete_user/" + id, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {

        alert("✅ 已刪除");

        // ✅ 重新載入
        loadUsers();
    });
}


// ============================
// ✅ 載入資料（核心）
// ============================
function loadUsers(){

    fetch("/users")
    .then(res => res.json())
    .then(data => {

        let list = document.getElementById("list");
        list.innerHTML = "";

        if(data.length === 0){
            list.innerHTML = "<li>目前沒有資料</li>";
            return;
        }

        data.forEach(user => {

            let li = document.createElement("li");

            // ✅ 顯示資料
            li.textContent = user.name + " - " + user.phone + " ";

            // ✅ 建立刪除按鈕
            let btn = document.createElement("button");
            btn.textContent = "刪除";

            // ✅ 綁定刪除功能
            btn.onclick = function(){
                deleteUser(user.id);
            };

            li.appendChild(btn);
            list.appendChild(li);
        });
    });
}

// ✅ 頁面一打開就載入
loadUsers();

</script>

</body>
</html>
